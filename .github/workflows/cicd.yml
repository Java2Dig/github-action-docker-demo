name: Python CI/CD GitHub Docker

# Trigger the workflow on push to the main branch or pull request events
on:
  push:   ##event
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ## We can name the jobs anything like build, test, etc.
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Step1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Step2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'
     
      #Step3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step4: Run the tests
      - name: Run tests
        run: |
          pytest
 ## 2nd job to build and push the Docker image, which depends on the successful completion of the first job 
  build-and-publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      # Step1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v2
      # Step2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1 
      # Step3: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step4: Build and push the Docker image
      - name: Build and push Docker image
        #id: build-and-publish
        uses: docker/build-push-action@v2
        with:
          context:
          file: ./DockerFile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/github-action-docker-demo:latest
      # Step5: Display the image digest
      - name: image digest
        run: echo ${{ steps.build-and-publish.outputs.digest }}
